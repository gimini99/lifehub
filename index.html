<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Lifehub Portfolio</title>
    <script>
      // Set the theme synchronously before paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("lifehub.theme");
          var ok = saved === "dark" || saved === "light" || saved === "sepia";
          if (ok) {
            document.documentElement.setAttribute("data-theme", saved);
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body class="bg-ink-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
